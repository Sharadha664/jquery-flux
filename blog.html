<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BQ43FFY7X4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BQ43FFY7X4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JQueryFlux | Technical Blog</title>
  <meta name="google-site-verification" content="vQk5YgdDTMWBHGuE1z1WM4pbZl4GdkgDpR8rkPAKpac" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --secondary:#3a7bd5; --dark:#0f172a; --bg:#f8fafc; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
    body { background:var(--bg); color:var(--dark); }
    header { background:white; padding:15px 8%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0; }
    .logo { font-size:1.8rem; font-weight:800; text-decoration:none; color:var(--dark); }
    .logo span { color:var(--secondary); }
    nav ul { display:flex; list-style:none; gap:25px; }
    nav a { text-decoration:none; font-weight:600; color:#64748b; }
    nav a.active, nav a:hover { color:var(--secondary); }
    .page { padding:60px 8%; }
    .blog-container { display:grid; grid-template-columns:300px 1fr; gap:40px; }
    .blog-sidebar { background:white; border-radius:20px; padding:25px; border:1px solid #e2e8f0; position:sticky; top:20px; height:80vh; overflow-y:auto; }
    .blog-nav-list { list-style:none; }
    .blog-nav-list li { padding:10px; border-radius:8px; cursor:pointer; font-size:0.9rem; margin-bottom:5px; color:#64748b; font-weight:600; }
    .blog-nav-list li:hover, .blog-nav-list li.active { background:#f1f5f9; color:var(--secondary); }
    .blog-post { background:white; padding:40px; border-radius:30px; border:1px solid #e2e8f0; margin-bottom:30px; display:none; }
    .blog-post.active { display:block; }
    .blog-post h3 { font-size:2rem; margin-bottom:20px; color:var(--secondary); }
    .blog-post h4 { margin:25px 0 12px; color:#0f172a; font-size:1.2rem; }
    .blog-post p { color:#475569; line-height:1.8; margin-bottom:14px; }
    .code-snippet { background:#0f172a; color:#38bdf8; padding:15px; border-radius:12px; font-family:'JetBrains Mono'; margin-top:15px; font-size:0.85rem; overflow-x:auto; }
    .diagram-box { background:#f8fafc; border:1px dashed #94a3b8; border-radius:20px; padding:20px; margin:20px 0; }
    .diagram-title { font-weight:800; color:var(--secondary); margin-bottom:10px; }
    .diagram-flow { display:flex; flex-wrap:wrap; align-items:center; gap:10px; justify-content:center; }
    .diagram-node { background:white; border:1px solid #cbd5e1; border-radius:14px; padding:12px 16px; font-weight:600; color:#334155; min-width:130px; text-align:center; }
    .diagram-arrow { font-size:1.4rem; color:var(--secondary); font-weight:800; }
    .topic-visual { width:100%; height:260px; object-fit:cover; border-radius:20px; margin:20px 0; }
    .blog-placeholder { background:white; padding:40px; border-radius:30px; border:1px solid #e2e8f0; color:#64748b; text-align:center; }
    @media(max-width:980px){ .blog-container { grid-template-columns:1fr; } .blog-sidebar { position:relative; top:0; height:auto; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">JQuery<span>Flux</span></a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="blog.html" class="active">Technical Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <section class="page">
    <div class="blog-container">
      <aside class="blog-sidebar">
        <h4>jQuery Library</h4>
        <ul id="blog-nav" class="blog-nav-list"></ul>
      </aside>
      <main id="blog-content">
        <div class="blog-placeholder" id="blog-placeholder">
          <h3 style="margin-bottom:10px; color:#3a7bd5;">Select a jQuery Topic</h3>
          <p>Click any heading on the left to view the full structured explanation, block diagram, and visual content for that topic.</p>
        </div>
      </main>
    </div>
  </section>

  <script>
    const jqueryTopics = [
      "Sizzle Engine", "DOM Selectors", "Event Delegation", "AJAX Streams", "Fade Effects",
      "Attr Control", "CSS Variable Hooks", "Form Serialization", "Method Chaining", "Closest Traversal",
      "Each Iteration", "Stop Queues", "Class Toggling", "Append Logic", "Data Attributes",
      "Val Management", "Delay/Timeout", "Prop vs Attr", "Offloading Events", "Global AJAX",
      "Wrap Elements", "InnerHTML Control", "Dimension Logic", "Scroll Detection", "Sibling Traversal"
    ];

    const topicImage = {
      "Sizzle Engine":"https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=1200",
      "DOM Selectors":"https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1200",
      "Event Delegation":"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200",
      "AJAX Streams":"https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1200",
      "Fade Effects":"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200",
      "Attr Control":"https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200",
      "CSS Variable Hooks":"https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=1200",
      "Form Serialization":"https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200",
      "Method Chaining":"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200",
      "Closest Traversal":"https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=1200",
      "Each Iteration":"https://images.unsplash.com/photo-1516321497487-e288fb19713f?w=1200",
      "Stop Queues":"https://images.unsplash.com/photo-1516321165247-4aa89a48be28?w=1200",
      "Class Toggling":"https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=1200",
      "Append Logic":"https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?w=1200",
      "Data Attributes":"https://images.unsplash.com/photo-1516321165247-4aa89a48be28?w=1200",
      "Val Management":"https://images.unsplash.com/photo-1526378722484-bd91ca387e72?w=1200",
      "Delay/Timeout":"https://images.unsplash.com/photo-1537432376769-00a6f9f2f5c0?w=1200",
      "Prop vs Attr":"https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=1200",
      "Offloading Events":"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200",
      "Global AJAX":"https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200",
      "Wrap Elements":"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200",
      "InnerHTML Control":"https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1200",
      "Dimension Logic":"https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200",
      "Scroll Detection":"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200",
      "Sibling Traversal":"https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=1200"
    };

    function buildTopicContent(topic){
      const id = topic.replace(/\s+/g,'-');
      return `
        <div class="blog-post" id="${id}">
          <h3>${topic}</h3>
          <img class="topic-visual" src="${topicImage[topic]}" alt="${topic}">
          <h4>Introduction</h4>
          <p>${topic} is an important part of jQuery used for writing dynamic, responsive, and browser-friendly web applications.</p>
          <h4>Core Explanation</h4>
          <p>jQuery simplifies code by providing compact methods for DOM work, effects, and interaction handling.</p>
          <h4>Block Diagram</h4>
          <div class="diagram-box">
            <div class="diagram-title">${topic} Workflow</div>
            <div class="diagram-flow">
              <div class="diagram-node">User Action</div>
              <div class="diagram-arrow">→</div>
              <div class="diagram-node">jQuery Selector</div>
              <div class="diagram-arrow">→</div>
              <div class="diagram-node">${topic}</div>
              <div class="diagram-arrow">→</div>
              <div class="diagram-node">DOM Update</div>
            </div>
          </div>
          <h4>Example Code</h4>
          <div class="code-snippet">
$('.flux-element').on('click', function() {
  $(this).addClass('active');
  $(this).find('.result').fadeIn();
});
          </div>
        </div>
      `;
    }

    jqueryTopics.forEach(topic => {
      const id = topic.replace(/\s+/g,'-');
      $('#blog-nav').append(`<li data-target="${id}">${topic}</li>`);
      $('#blog-content').append(buildTopicContent(topic));
    });

    $(document).on('click', '#blog-nav li', function() {
      const target = $(this).data('target');
      $('#blog-nav li').removeClass('active');
      $(this).addClass('active');
      $('#blog-placeholder').hide();
      $('.blog-post').removeClass('active').hide();
      $('#' + target).addClass('active').show();
    });
  </script>
</body>
</html>
