<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BQ43FFY7X4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BQ43FFY7X4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JQueryFlux | Home</title>
  <meta name="google-site-verification" content="vQk5YgdDTMWBHGuE1z1WM4pbZl4GdkgDpR8rkPAKpac" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#00d2ff; --secondary:#3a7bd5; --accent:#22c55e; --dark:#0f172a; --bg:#f8fafc; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
    body { background:var(--bg); color:var(--dark); }
    header { background:rgba(255,255,255,0.9); backdrop-filter:blur(20px); padding:15px 8%; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; border-bottom:1px solid #e2e8f0; }
    .logo { font-size:1.8rem; font-weight:800; letter-spacing:-1px; color:var(--dark); text-decoration:none; }
    .logo span { color:var(--secondary); }
    nav ul { display:flex; list-style:none; gap:25px; }
    nav a { text-decoration:none; font-weight:600; color:#64748b; transition:0.3s; }
    nav a:hover, nav a.active { color:var(--secondary); }
    .page { padding:60px 8%; }
    .dynamic-hero { position:relative; height:450px; border-radius:40px; overflow:hidden; background:#0f172a; display:flex; align-items:center; justify-content:center; margin-bottom:60px; }
    .hero-bg { position:absolute; width:100%; height:100%; background:radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); z-index:1; }
    .floating-circles span { position:absolute; background:rgba(58,123,213,0.2); border-radius:50%; filter:blur(40px); z-index:2; animation:float 10s infinite alternate; }
    @keyframes float { from { transform:translate(0,0); } to { transform:translate(30px,50px); } }
    .welcome-card { position:relative; z-index:10; background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); padding:50px 80px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); text-align:center; transform-style:preserve-3d; transition:0.1s; }
    .welcome-card h1 { font-size:3.5rem; color:white; font-weight:800; margin-bottom:10px; }
    .welcome-card h1 span { color:var(--primary); }
    .welcome-card p { color:#94a3b8; font-size:1.2rem; letter-spacing:2px; }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:30px; }
    .product-card { background:white; padding:20px; border-radius:30px; border:1px solid #e2e8f0; transition:0.3s; }
    .product-card:hover { transform:translateY(-10px); box-shadow:0 20px 40px rgba(0,0,0,0.05); border-color:var(--secondary); }
    .product-card img { width:100%; border-radius:20px; height:180px; object-fit:cover; margin-bottom:15px; }
    .product-card h3 { font-size:1.1rem; margin-bottom:5px; }
    .product-card .price { font-weight:800; color:var(--secondary); font-size:1.3rem; margin-bottom:12px; }
    .btn-order { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">JQuery<span>Flux</span></a>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="blog.html">Technical Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
      </ul>
    </nav>
  </header>

  <section class="page">
    <div class="dynamic-hero" id="hero-area">
      <div class="hero-bg"></div>
      <div class="floating-circles">
        <span style="width:200px; height:200px; top:10%; left:10%;"></span>
        <span style="width:150px; height:150px; bottom:10%; right:15%; background:rgba(0,210,255,0.1);"></span>
      </div>
      <div class="welcome-card" id="tilt-card">
        <h1>Welcome to <span>JQueryFlux</span></h1>
        <p>INNOVATING ASYNCHRONOUS COMMERCE</p>
      </div>
    </div>

    <h2 style="margin-bottom: 30px; font-size: 2rem;">Hardware Inventory</h2>
    <div class="product-grid" id="p-grid"></div>
  </section>

  <script>
    const products = [
      { id: 1, n: "Flux Pods Pro", p: 199, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
      { id: 2, n: "Vision Watch 6", p: 349, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" },
      { id: 3, n: "Core Laptop 16", p: 1599, img: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400" },
      { id: 4, n: "Ultra Monitor", p: 599, img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400" },
      { id: 5, n: "Mechanical Keys", p: 149, img: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400" },
      { id: 6, n: "Smart Projector", p: 899, img: "https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=400" }
    ];

    products.forEach(p => {
      $('#p-grid').append(`
        <div class="product-card">
          <img src="${p.img}" alt="${p.n}">
          <h3>${p.n}</h3>
          <p class="price">$${p.p}</p>
          <button class="btn-order">Add to Cart</button>
        </div>
      `);
    });

    $('#hero-area').mousemove(function(e) {
      let x = (window.innerWidth / 2 - e.pageX) / 25;
      let y = (window.innerHeight / 2 - e.pageY) / 25;
      $('#tilt-card').css("transform", `rotateY(${x}deg) rotateX(${y}deg)`);
    });
  </script>
</body>
</html>
